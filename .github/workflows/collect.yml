name: 🌺 Verdnatura Price Tracker

on:
  schedule:
    - cron: "0 6  * * 1-6"
    - cron: "0 11 * * 1-6"
    - cron: "0 16 * * 1-6"
    - cron: "0 2  * * 0"
  workflow_dispatch:
    inputs:
      collect_tiers:
        description: 'Capturer les paliers de prix (lent ~4h)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  collect:
    name: Collecte des prix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name != 'schedule' || (github.event.schedule != '0 2 * * 0')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dépendances
        run: pip install --quiet requests

      - name: 🔍 Collecte prix
        env:
          VERDNATURA_USER: ${{ secrets.VERDNATURA_USER }}
          VERDNATURA_PASS: ${{ secrets.VERDNATURA_PASS }}
          COLLECT_TIERS: "0"
        run: python collect.py

      - name: 💾 Commit
        run: |
          git config user.name  "Verdnatura Bot 🌺"
          git config user.email "bot@verdnatura.local"
          git add verdnatura.db data.json
          git diff --staged --quiet || git commit -m "📊 Snapshot $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

  collect-tiers:
    name: Collecte paliers de prix (hebdo)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.collect_tiers == 'true')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dépendances
        run: pip install --quiet requests

      - name: 🔍 Collecte prix + paliers
        env:
          VERDNATURA_USER: ${{ secrets.VERDNATURA_USER }}
          VERDNATURA_PASS: ${{ secrets.VERDNATURA_PASS }}
          COLLECT_TIERS: "1"
        run: python collect.py

      - name: 💾 Commit
        run: |
          git config user.name  "Verdnatura Bot 🌺"
          git config user.email "bot@verdnatura.local"
          git add verdnatura.db data.json
          git diff --staged --quiet || git commit -m "📊 Snapshot+Tiers $(date -u '+%Y-%m-%d') UTC"
          git push
