<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌺 Verdnatura — Dashboard Prix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1f17;--surf:#152b1e;--surf2:#1a3326;--border:#1e3d2a;
  --g1:#40916c;--g2:#74c69d;--g3:#b7e4c7;--text:#d8f3dc;--muted:#74c69d;
  --red:#e07070;--orange:#e0a070;--yellow:#e0d070;--radius:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;min-height:100vh}
header{background:var(--surf);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
header h1{font-size:1.1rem;color:var(--g2);white-space:nowrap}
.header-stats{display:flex;gap:.75rem;flex-wrap:wrap;margin-left:auto;font-size:.75rem;color:var(--muted)}
.hstat{background:rgba(64,145,108,.15);border:1px solid var(--border);border-radius:6px;padding:.2rem .6rem}
.hstat strong{color:var(--g2)}
#sidebar-toggle{display:none;background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.3rem .7rem;cursor:pointer;font-size:1.1rem;line-height:1}
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 45px)}
aside{width:200px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);overflow-y:auto;padding:.5rem 0}
.cat-btn{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;cursor:pointer;border:none;background:none;color:var(--muted);width:100%;text-align:left;font-size:.78rem;border-left:3px solid transparent;transition:all .15s}
.cat-btn:hover{background:rgba(64,145,108,.1);color:var(--text)}
.cat-btn.active{background:rgba(64,145,108,.18);color:var(--g2);border-left-color:var(--g1)}
.cat-btn .cat-count{margin-left:auto;font-size:.7rem;background:rgba(116,198,157,.12);border-radius:10px;padding:.1rem .35rem}
.cat-emoji{font-size:1rem;width:20px;text-align:center}
main{flex:1;overflow-y:auto;padding:.75rem}
.toolbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
input[type=search],select{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.35rem .6rem;font-size:.78rem;outline:none}
input[type=search]{flex:1;min-width:160px}
input[type=search]:focus,select:focus{border-color:var(--g1)}
select option{background:var(--bg)}
.btn{border:1px solid var(--border);background:var(--surf);color:var(--muted);border-radius:6px;padding:.35rem .7rem;cursor:pointer;font-size:.75rem}
.btn:hover{border-color:var(--g1);color:var(--text)}
.btn-green{border-color:var(--g1);color:var(--g2)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead th{background:var(--surf);padding:.5rem .6rem;text-align:left;color:var(--muted);white-space:nowrap;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);user-select:none}
thead th[data-sort]{cursor:pointer}
thead th[data-sort]:hover{color:var(--g2)}
thead th.sorted{color:var(--g2)}
tbody tr{border-top:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:hover{background:rgba(64,145,108,.1)}
td{padding:.45rem .6rem;vertical-align:middle}
td.name{font-weight:500;max-width:220px}
td.name span{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
td.mono{font-family:monospace;color:var(--g2)}
td.muted{color:var(--muted)}
td.right{text-align:right}
.badge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600}
.badge-active{background:rgba(64,145,108,.2);color:var(--g2)}
.badge-gone{background:rgba(224,112,112,.15);color:var(--red)}
.cond{display:inline-block;background:rgba(116,198,157,.1);border:1px solid rgba(116,198,157,.2);border-radius:4px;padding:.1rem .35rem;font-size:.7rem;color:var(--g3)}
.margin-good{color:#4caf50;font-weight:600}
.margin-ok{color:var(--yellow);font-weight:600}
.margin-bad{color:var(--red);font-weight:600}
input.prix-vente{background:rgba(116,198,157,.08);border:1px solid rgba(116,198,157,.15);color:var(--text);border-radius:4px;padding:.15rem .35rem;width:56px;font-size:.73rem;text-align:right}
input.prix-vente:focus{outline:none;border-color:var(--g1);background:rgba(64,145,108,.15)}
input.cdt-vente{background:rgba(116,198,157,.08);border:1px solid rgba(116,198,157,.15);color:var(--text);border-radius:4px;padding:.15rem .3rem;width:34px;font-size:.73rem;text-align:center}
input.cdt-vente:focus{outline:none;border-color:var(--g1);background:rgba(64,145,108,.15)}
/* Masquer les flèches +/- des champs number (non utiles, gênent la saisie tactile) */
input.prix-vente::-webkit-outer-spin-button,
input.prix-vente::-webkit-inner-spin-button,
input.cdt-vente::-webkit-outer-spin-button,
input.cdt-vente::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input.prix-vente[type=number],input.cdt-vente[type=number]{-moz-appearance:textfield}
.manual-flag{font-size:.6rem;color:var(--g2);margin-top:.1rem}

/* ── FAVORIS ── */
.fav-star{cursor:pointer;font-size:1.05rem;color:var(--border);user-select:none;transition:color .15s,transform .1s;display:inline-block}
.fav-star:hover{transform:scale(1.15)}
.fav-star.active{color:#e0c040}
td.fav-cell{text-align:center;width:32px;padding:.45rem .2rem}
.pv-row{display:flex;align-items:center;gap:.25rem}
.pv-row .x{color:var(--muted);font-size:.68rem}
.match-badge{font-size:.58rem;color:var(--muted);margin-top:.15rem}
.pager{display:flex;align-items:center;gap:.4rem;margin-top:.6rem;font-size:.75rem;color:var(--muted)}
.pager button{background:var(--surf);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:.25rem .55rem;cursor:pointer}
.pager button:hover:not(:disabled){border-color:var(--g1);color:var(--text)}
.pager button:disabled{opacity:.35;cursor:default}
.import-panel{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;margin-bottom:.75rem;display:none}
.import-panel.open{display:block}
.import-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
textarea.csv-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.5rem;font-family:monospace;font-size:.72rem;width:100%;height:100px;resize:vertical}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
#modal-bg.open{display:flex}
#modal{background:var(--surf);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;padding:1.25rem}
#modal h2{font-size:1rem;color:var(--g2);margin-bottom:.25rem}
#modal .meta{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
#modal-close{float:right;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:.25rem .6rem;cursor:pointer;font-size:.75rem}
#modal-close:hover{border-color:var(--g1);color:var(--text)}
.chart-wrap{position:relative;height:220px;margin-bottom:1rem}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem}
.ms{background:var(--bg);border-radius:8px;padding:.5rem .65rem}
.ms-val{font-size:1.1rem;font-weight:700;color:var(--g2)}
.ms-lbl{font-size:.68rem;color:var(--muted)}
.period-btns{display:flex;gap:.35rem;margin-bottom:.75rem}
.pbtn{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.25rem .65rem;cursor:pointer;font-size:.72rem}
.pbtn.active{background:var(--g1);color:#fff;border-color:var(--g1)}
.tier-table{width:100%;border-collapse:collapse;font-size:.75rem;margin-top:.5rem}
.tier-table th{color:var(--muted);padding:.3rem .5rem;border-bottom:1px solid var(--border);text-align:right}
.tier-table td{padding:.3rem .5rem;border-bottom:1px solid rgba(30,61,42,.5);text-align:right}
.tier-table td:first-child{text-align:left;color:var(--g3)}
.spark{width:72px;height:24px}
#loading{text-align:center;padding:4rem;color:var(--muted)}

/* ══ RESPONSIVE ══ */
@media (max-width:768px){
  header{padding:.5rem .75rem;gap:.4rem}
  header h1{font-size:.88rem}
  .header-stats{font-size:.67rem;gap:.35rem}
  .hstat{padding:.12rem .35rem}
  #sidebar-toggle{display:block}
  .layout{flex-direction:column;height:auto;overflow:visible}
  aside{width:100%;max-height:0;overflow:hidden;border-right:none;border-bottom:1px solid var(--border);transition:max-height .25s ease;display:flex;flex-wrap:wrap;padding:0}
  aside.open{max-height:500px;overflow-y:auto;padding:.4rem 0}
  .cat-btn{width:50%;font-size:.72rem;padding:.4rem .6rem}
  main{padding:.5rem}
  input[type=search]{min-width:100%}
  select,input[type=search]{font-size:.73rem}

  /* Scroll horizontal natif au lieu de masquer les colonnes */
  .tbl-wrap{-webkit-overflow-scrolling:touch}
  table{min-width:920px}
  td,thead th{padding:.3rem .4rem;font-size:.7rem;white-space:nowrap}
  td.name{max-width:150px;white-space:normal}

  #modal-bg{padding:.4rem}
  #modal{border-radius:10px;padding:.85rem}
  .modal-stats{grid-template-columns:repeat(2,1fr)}
  .chart-wrap{height:160px}
}
@media (max-width:420px){
  .cat-btn{width:100%}
  .hstat:nth-child(n+3){display:none}
}

/* Indicateur visuel de scroll horizontal disponible (mobile) */
@media (max-width:768px){
  .tbl-wrap{position:relative}
  .tbl-wrap::after{
    content:"⇆ glisser pour voir plus";
    position:absolute; top:-1.3rem; right:0;
    font-size:.62rem; color:var(--muted); opacity:.7;
  }
}
</style>
</head>
<body>
<header>
  <span style="font-size:1.5rem">🌺</span>
  <h1>Verdnatura — Dashboard Prix</h1>
  <button id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
  <div class="header-stats" id="hstats"></div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div style="padding:.4rem .75rem .2rem;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Catégories</div>
    <button class="cat-btn active" data-cat="all" onclick="selectCat('all',this)">
      <span class="cat-emoji">🌐</span> Tous
      <span class="cat-count" id="cnt-all">—</span>
    </button>
    <button class="cat-btn" data-cat="favorites" onclick="selectCat('favorites',this)">
      <span class="cat-emoji">⭐</span> Favoris
      <span class="cat-count" id="cnt-fav">0</span>
    </button>
    <div style="height:1px;background:var(--border);margin:.3rem .75rem"></div>
  </aside>

  <main>
    <div class="import-panel" id="import-panel">
      <div style="font-size:.8rem;color:var(--g2);font-weight:600">📥 Importer prix de vente manuels</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:.3rem">
        Format CSV : <code style="color:var(--g3)">ref,prix_vente</code> ou <code style="color:var(--g3)">sous_genre,prix_vente</code>
      </div>
      <textarea class="csv-input" id="csv-input" placeholder="ref,prix_vente&#10;191979,0.50&#10;191980,0.80"></textarea>
      <div class="import-row">
        <button class="btn btn-green" onclick="importPrices()">✅ Importer</button>
        <button class="btn" onclick="clearPrices()">🗑️ Effacer tout</button>
        <button class="btn" onclick="exportPrices()">📤 Exporter</button>
        <span id="import-status" style="font-size:.72rem;color:var(--muted)"></span>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="search" placeholder="🔍 Rechercher…">
      <select id="filter-sub"><option value="">Tous sous-genres</option></select>
      <button class="btn" id="filter-status-btn" data-status="all" onclick="toggleActiveOnly()">ACTIF</button>
      <select id="sort-by">
        <option value="name">Trier : Nom</option>
        <option value="price_last">Prix achat</option>
        <option value="price_unit">Prix/unité</option>
        <option value="margin_pct">Marge %</option>
        <option value="available_last">Dispo</option>
      </select>
      <button class="btn btn-green" id="import-toggle-btn" onclick="toggleImport()">💰 Prix de vente</button>
      <span id="last-update" style="font-size:.7rem;color:var(--muted);margin-left:auto"></span>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:32px">★</th>
            <th>Ref</th>
            <th>Produit</th>
            <th>Sous-genre</th>
            <th data-sort="grouping">Cond.</th>
            <th data-sort="price_last">Prix/cond.</th>
            <th data-sort="price_unit">Prix/unité</th>
            <th data-sort="available_last">Dispo</th>
            <th>Cdt V. × Prix TTC</th>
            <th data-sort="margin_pct">Marge</th>
            <th>Évol.</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button id="prev-btn">◀</button>
      <span id="page-info"></span>
      <button id="next-btn">▶</button>
      <span id="result-count" style="margin-left:.5rem"></span>
    </div>
  </main>
</div>

<div id="modal-bg">
  <div id="modal">
    <button id="modal-close">✕ Fermer</button>
    <h2 id="modal-name"></h2>
    <div class="meta" id="modal-meta"></div>
    <div class="modal-stats" id="modal-stats"></div>
    <div id="modal-attrs"></div>
    <div class="period-btns">
      <button class="pbtn" data-days="7">7j</button>
      <button class="pbtn active" data-days="30">30j</button>
      <button class="pbtn" data-days="90">90j</button>
      <button class="pbtn" data-days="0">Tout</button>
    </div>
    <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
    <div id="modal-tiers"></div>
  </div>
</div>

<div id="loading">⏳ Chargement…</div>
<div id="app" style="display:none"></div>

<script>
// ── TRADUCTION ─────────────────────────────────────────────────
const TR = {
  "Blanco":"Blanc","Rojo":"Rouge","Rosa":"Rose","Amarillo":"Jaune",
  "Naranja":"Orange","Morado":"Violet","Lila":"Lilas","Fucsia":"Fuchsia",
  "Salmon":"Saumon","Verde":"Vert","Azul":"Bleu","Bicolor":"Bicolore",
  "Burgundy":"Bordeaux","Coral":"Corail","Crema":"Crème","Bronce":"Bronze",
  "Negro":"Noir","Marfil":"Ivoire","Lavanda":"Lavande","Magenta":"Magenta",
  "Tinted":"Teinté","Variado":"Varié","Mix":"Mix",
  "Rosas":"Roses","Clavel":"Œillet","Crisantemo":"Chrysanthème",
  "Gerbera":"Gerbera","Tulipan":"Tulipe","Tulipán":"Tulipe",
  "Lilium":"Lys","Hydrangea":"Hortensia","Alstroemeria":"Alstroméria",
  "Anthurium":"Anthurium","Orquidea":"Orchidée","Orquídea":"Orchidée",
  "Calas":"Calla","Gypsophila":"Gypsophile","Paniculata":"Paniculata",
  "Lisianthus":"Lisianthus","Cymbidium":"Cymbidium","Bouquet":"Bouquet",
  "Frutos":"Fruits","Ramas":"Branches","Tropicales":"Tropicaux",
  "Silvestre":"Sauvage","Espigada":"Épis","Relleno":"Remplissage",
  "Bulbos":"Bulbes","Flores":"Fleurs","Colombia":"Colombie",
  "Holanda":"Hollande","Ecuador":"Équateur","España":"Espagne",
  "Grande":"Grand","Mini":"Mini","Short":"Court","Nacional":"National",
  "Subasta":"Enchères","Jardin":"Jardin","Jardín":"Jardin",
  "Spray":"Spray","Uniflora":"Uniflore","Preservado":"Préservé",
  "Seco":"Séché","Natural":"Naturel","Artificial":"Artificiel",
  "Navidad":"Noël","Campana":"Campagne","Campaña":"Campagne","Variada":"Variée",
  "Maceta":"Pot","Planta":"Plante","Plantas":"Plantes","Hoja":"Feuille",
  "Hojas":"Feuilles","Flor":"Fleur","Ramo":"Bouquet","Ramos":"Bouquets",
  "Cesta":"Panier","Cestas":"Paniers","Lazo":"Ruban","Cinta":"Ruban",
};

// Traduction des labels de caractéristiques produit (tag/value Verdnatura)
const ATTR_LABELS = {
  "Color":"Couleur", "Altura":"Hauteur tige", "Origen":"Origine",
  "Diametro":"Diamètre", "Diámetro":"Diamètre", "Ancho":"Largeur",
  "Alto":"Hauteur", "Largo":"Longueur", "Peso":"Poids",
  "Material":"Matière", "Forma":"Forme", "Capacidad":"Capacité",
  "Calibre":"Calibre", "Variedad":"Variété", "Tallos":"Nombre de tiges",
  "Envase":"Contenant", "Tono":"Teinte",
};
function attrLabel(tag){ return ATTR_LABELS[tag] || tag; }
function attrValue(val){
  // Traduire les couleurs/valeurs connues, sinon laisser tel quel
  return TR[val] || val;
}

function traducir(name){
  if(!name) return name;
  let s = name.replace(/^[·•\-]\s*/,"").trim();
  s = s.replace(/([A-Za-z\u00C0-\u024F]+)/g, w => {
    const cap = w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
    return TR[w] || TR[cap] || TR[w.toUpperCase()] || w;
  });
  return s;
}

// ── REALM MAP ─────────────────────────────────────────────────
const REALM_MAP = {
  "🌸 Fleurs coupées":{label:"Fleurs coupées",emoji:"🌸"},
  "🪴 Plantes":{label:"Plantes",emoji:"🪴"},
  "🎀 Compléments floraux":{label:"Compléments floraux",emoji:"🎀"},
  "🌿 Artificiel":{label:"Artificiel",emoji:"🌿"},
  "🍃 Feuillages frais":{label:"Feuillages frais",emoji:"🍃"},
  "💐 Confection naturelle":{label:"Confection naturelle",emoji:"💐"},
  "🎋 Confection artificielle":{label:"Confection artificielle",emoji:"🎋"},
  "🌾 Sec & Préservé":{label:"Sec & Préservé",emoji:"🌾"},
  realm_1:{label:"Fleurs coupées",emoji:"🌸"},
  realm_2:{label:"Plantes",emoji:"🪴"},
  realm_3:{label:"Compléments floraux",emoji:"🎀"},
  realm_4:{label:"Artificiel",emoji:"🌿"},
  realm_5:{label:"Feuillages frais",emoji:"🍃"},
  realm_7:{label:"Confection naturelle",emoji:"💐"},
  realm_10:{label:"Confection artificielle",emoji:"🎋"},
  realm_13:{label:"Sec & Préservé",emoji:"🌾"},
};

function catInfo(cat){
  if(REALM_MAP[cat]) return REALM_MAP[cat];
  const m = cat && cat.match(/^([\u{1F300}-\u{1FFFF}]|\p{Emoji})\s*(.+)$/u);
  if(m) return {emoji:m[1],label:m[2]};
  return {emoji:"📦",label:cat||"?"};
}

// ── STATE ─────────────────────────────────────────────────────
let DATA=null, filtered=[], sortKey="name", sortDir=1;
let page=0; const PS=60;
let activeCat="all", sellPrices={}, sellCdt={}, activeChart=null, selectedRef=null;
let favorites = new Set();
const TVA = 1.10; // TVA fleurs/végétaux en boutique (10%)

// ── LOAD ──────────────────────────────────────────────────────
async function load(){
  try{
    const r = await fetch("data.json?"+Date.now());
    if(!r.ok) throw new Error(r.status);
    DATA = await r.json();
    loadSellPrices();

    // Charger prices.json (prix Lilium stables)
    try{
      const rp = await fetch("prices.json?"+Date.now());
      if(rp.ok){
        const dp = await rp.json();
        const pm = dp.prices||{};
        DATA.products = DATA.products.map(p=>{
          const pv = pm[p.ref]||pm[String(p.ref)];
          if(pv){
            return {...p, pv_ttc:parseFloat(pv.pv_ttc)||0, pv_label:pv.pv_label||"",
                     pv_score:pv.pv_score||0, pv_cdt:parseFloat(pv.pv_cdt)||1};
          }
          return p;
        });
        console.log("✅ prices.json — "+Object.keys(pm).length+" prix chargés");
      }
    }catch(e){console.warn("prices.json non dispo:",e);}

    buildSidebar();
    buildSubFilter();
    render();
    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";
  }catch(e){
    document.getElementById("loading").innerHTML=
      "❌ Impossible de charger data.json<br><small>Vérifie que data.json est dans le repo GitHub</small>";
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────
function buildSidebar(){
  const aside=document.getElementById("sidebar");
  const counts={};
  DATA.products.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1;});
  document.getElementById("cnt-all").textContent=DATA.products.length;
  const order=["🌸 Fleurs coupées","🪴 Plantes","🎀 Compléments floraux","🌿 Artificiel","🍃 Feuillages frais","💐 Confection naturelle","🎋 Confection artificielle","🌾 Sec & Préservé"];
  const catKeys=[...new Set(DATA.products.map(p=>p.category))].sort((a,b)=>(order.indexOf(a)+1||99)-(order.indexOf(b)+1||99));
  catKeys.forEach(cat=>{
    const info=catInfo(cat);
    const btn=document.createElement("button");
    btn.className="cat-btn"; btn.dataset.cat=cat;
    btn.innerHTML=`<span class="cat-emoji">${info.emoji}</span> ${info.label}<span class="cat-count">${counts[cat]||0}</span>`;
    btn.onclick=()=>selectCat(cat,btn);
    aside.appendChild(btn);
  });
  const s=DATA.stats||{};
  const d=new Date(DATA.generated||Date.now());
  document.getElementById("hstats").innerHTML=`
    <div class="hstat"><strong>${(s.active||DATA.products.length).toLocaleString()}</strong> actifs</div>
    <div class="hstat"><strong>${s.new_7d||0}</strong> nouveaux 7j</div>
    <div class="hstat"><strong>${s.lost_7d||0}</strong> disparus 7j</div>
    <div class="hstat"><strong>${(s.total_snapshots||0).toLocaleString()}</strong> obs.</div>`;
  document.getElementById("last-update").textContent=
    "Mis à jour : "+d.toLocaleDateString("fr-FR")+" "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  updateFavCount();
}

function selectCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  buildSubFilter(); applyFilters();
}

function buildSubFilter(){
  const prods = activeCat==="all" ? DATA.products
    : activeCat==="favorites" ? DATA.products.filter(p=>isFavorite(p.ref))
    : DATA.products.filter(p=>p.category===activeCat);
  const subs=[...new Set(prods.map(p=>p.subcategory||"").filter(Boolean))].sort();
  const sel=document.getElementById("filter-sub");
  sel.innerHTML='<option value="">Tous sous-genres</option>';
  subs.forEach(s=>{const o=document.createElement("option");o.value=s;o.textContent=s;sel.appendChild(o);});
}

// ── PRIX DE VENTE ─────────────────────────────────────────────
function loadSellPrices(){
  try{sellPrices=JSON.parse(localStorage.getItem("vdn_sell_prices")||"{}");}
  catch{sellPrices={};}
  try{sellCdt=JSON.parse(localStorage.getItem("vdn_sell_cdt")||"{}");}
  catch{sellCdt={};}
  loadFavorites();
}

function loadFavorites(){
  try{
    const arr = JSON.parse(localStorage.getItem("vdn_favorites")||"[]");
    favorites = new Set(arr.map(String));
  }catch{ favorites = new Set(); }
}
function saveFavorites(){
  try{ localStorage.setItem("vdn_favorites", JSON.stringify([...favorites])); }
  catch(e){ console.error("[vdn] Erreur sauvegarde favoris", e); }
}
function isFavorite(ref){ return favorites.has(String(ref)); }
function toggleFavorite(ref, starEl){
  ref = String(ref);
  if(favorites.has(ref)) favorites.delete(ref);
  else favorites.add(ref);
  saveFavorites();
  if(starEl){
    starEl.classList.toggle("active", favorites.has(ref));
    starEl.textContent = favorites.has(ref) ? "★" : "☆";
  }
  updateFavCount();
  // Si on est sur l'onglet Favoris et qu'on vient de désélectionner, réappliquer le filtre
  if(activeCat==="favorites") applyFilters();
}
function updateFavCount(){
  const el = document.getElementById("cnt-fav");
  if(el) el.textContent = favorites.size;
}
function saveSellPrices(){
  try{ localStorage.setItem("vdn_sell_prices",JSON.stringify(sellPrices)); }
  catch(e){ console.error("[vdn] Erreur sauvegarde PV (localStorage bloqué ?)", e); alert("⚠️ Impossible de sauvegarder le prix — le stockage local est peut-être désactivé (navigation privée ?)"); }
}
function saveSellCdt(){
  try{ localStorage.setItem("vdn_sell_cdt",JSON.stringify(sellCdt)); }
  catch(e){ console.error("[vdn] Erreur sauvegarde CDT (localStorage bloqué ?)", e); alert("⚠️ Impossible de sauvegarder le conditionnement — le stockage local est peut-être désactivé (navigation privée ?)"); }
}

function getPrixVente(p){
  // 1. Manuel (priorité)
  if(sellPrices[p.ref]!==undefined) return parseFloat(sellPrices[p.ref]);
  if(p.subcategory&&sellPrices[p.subcategory]!==undefined) return parseFloat(sellPrices[p.subcategory]);
  // 2. Lilium (prices.json)
  if(p.pv_ttc&&p.pv_ttc>0) return parseFloat(p.pv_ttc);
  return null;
}

function getCdtVente(p){
  // 1. Manuel (priorité)
  if(sellCdt[p.ref]!==undefined) return parseFloat(sellCdt[p.ref]) || 1;
  if(p.subcategory&&sellCdt[p.subcategory]!==undefined) return parseFloat(sellCdt[p.subcategory]) || 1;
  // 2. Lilium (prices.json)
  if(p.pv_cdt&&p.pv_cdt>0) return parseFloat(p.pv_cdt);
  return 1;
}

function attrsSummary(p){
  if(!p.attrs || Object.keys(p.attrs).length===0) return "";
  // Dans le tableau, on affiche seulement les caractéristiques dimensionnelles clés (compact)
  const keys = ["Altura","Diametro","Diámetro","Ancho","Alto","Largo"];
  const parts = keys
    .filter(k => p.attrs[k])
    .map(k => `${attrLabel(k)}: ${esc(p.attrs[k])}`);
  if(parts.length===0) return "";
  return `<div style="font-size:.65rem;color:var(--g3);opacity:.8">${parts.join(" · ")}</div>`;
}

function matchBadge(p){
  if(!p.pv_ttc||!p.pv_label) return "";
  const s=p.pv_score||0;
  const icon=s>=85?"✅":s>=70?"🟡":"🔴";
  return `<div class="match-badge">${icon} ${p.pv_label.substring(0,22)}</div>`;
}

function importPrices(){
  const csv=document.getElementById("csv-input").value.trim();
  if(!csv){alert("Colle d'abord ton CSV");return;}
  const lines=csv.split("\n").filter(l=>l.trim()&&!l.startsWith("ref,")&&!l.startsWith("sous_genre,"));
  let count=0;
  lines.forEach(line=>{
    const[key,val]=line.split(",").map(s=>s.trim());
    if(key&&val&&!isNaN(parseFloat(val))){sellPrices[key]=parseFloat(val);count++;}
  });
  saveSellPrices();
  document.getElementById("import-status").textContent=`✅ ${count} prix importés`;
  applyFilters();
}
function clearPrices(){
  if(!confirm("Effacer tous les prix manuels ?"))return;
  sellPrices={};saveSellPrices();
  document.getElementById("import-status").textContent="🗑️ Effacé";
  applyFilters();
}
function exportPrices(){
  const lines=["ref,prix_vente",...Object.entries(sellPrices).map(([k,v])=>`${k},${v}`)];
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="prix_vente.csv";a.click();
}
function toggleImport(){
  const panel = document.getElementById("import-panel");
  const btn = document.getElementById("import-toggle-btn");
  panel.classList.toggle("open");
  btn.textContent = panel.classList.contains("open") ? "✖️ Fermer" : "💰 Prix de vente";
}

// ── FILTER + SORT ─────────────────────────────────────────────
function toggleActiveOnly(){
  const btn = document.getElementById("filter-status-btn");
  const isActive = btn.dataset.status === "active";
  const next = isActive ? "all" : "active";
  btn.dataset.status = next;
  btn.className = next==="active" ? "btn btn-green" : "btn";
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById("search").value.toLowerCase();
  const sub=document.getElementById("filter-sub").value;
  const st=document.getElementById("filter-status-btn").dataset.status;
  filtered=DATA.products.filter(p=>{
    if(activeCat==="favorites"){ if(!isFavorite(p.ref)) return false; }
    else if(activeCat!=="all"&&p.category!==activeCat) return false;
    if(sub&&(p.subcategory||"")!==sub)return false;
    if(st==="active"&&!p.is_active)return false;
    if(st==="inactive"&&p.is_active)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.subcategory||"").toLowerCase().includes(q)&&!String(p.ref).includes(q))return false;
    return true;
  });
  filtered.forEach(p=>{
    // PA unitaire — Verdnatura affiche déjà le prix À L'UNITÉ (tige/pièce).
    // p.grouping = quantité MINIMUM d'achat, ce n'est PAS un diviseur de prix.
    p._paUnit = p.price_last || 0;
    p._minQty = p.grouping > 0 ? p.grouping : 1;

    // PV unitaire = Prix total de vente (TTC) / CDT Vente (conditionnement boutique)
    const pvTotal = getPrixVente(p);
    const cdtVente = getCdtVente(p);
    p._pv = pvTotal;
    p._cdtVente = cdtVente;
    p._pvUnitHt = pvTotal ? (pvTotal / cdtVente) / TVA : null;

    // Marge à l'unité
    p._mpct = (p._pvUnitHt!=null && p._paUnit>0)
      ? (p._pvUnitHt - p._paUnit) / p._pvUnitHt * 100
      : null;
    p._coeff = (p._pvUnitHt!=null && p._paUnit>0)
      ? p._pvUnitHt / p._paUnit
      : null;
  });
  filtered.sort((a,b)=>{
    let va=sortKey==="price_unit"?a._unit:sortKey==="margin_pct"?(a._mpct||0):(a[sortKey]??0);
    let vb=sortKey==="price_unit"?b._unit:sortKey==="margin_pct"?(b._mpct||0):(b[sortKey]??0);
    if(typeof va==="string")return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });
  page=0; renderTable();
}

// ── TABLE ─────────────────────────────────────────────────────
function renderTable(){
  const slice=filtered.slice(page*PS,(page+1)*PS);
  const tbody=document.getElementById("tbody");
  tbody.innerHTML=slice.map(p=>{
    const unit=p._paUnit, pv=p._pv, mpct=p._mpct, cdtV=p._cdtVente;
    const unitStr=unit>0?`<span class="mono">${unit.toFixed(3)}€</span>`:"<span class='muted'>—</span>";
    const condStr=p.grouping>1?`<span class="cond" title="Quantité minimum d'achat">min ×${p.grouping}</span>`:`<span class="cond">unité</span>`;

    const refSafe = String(p.ref).replace(/[^a-zA-Z0-9_-]/g,"_");
    const isManual = sellPrices[String(p.ref)]!==undefined || sellCdt[String(p.ref)]!==undefined;
    const cdtInput = `<input class="cdt-vente" type="number" inputmode="numeric" step="1" min="1" value="${cdtV}" data-ref="${esc(p.ref)}" onchange="setCdtVente(this)" onblur="setCdtVente(this)" onclick="event.stopPropagation()">`;
    const pvInput = pv!=null
      ?`<input class="prix-vente" type="number" inputmode="decimal" step="0.01" min="0" value="${pv.toFixed(2)}" data-ref="${esc(p.ref)}" onchange="setPrixVente(this)" onblur="setPrixVente(this)" onclick="event.stopPropagation()">`
      :`<input class="prix-vente" type="number" inputmode="decimal" step="0.01" min="0" placeholder="—" data-ref="${esc(p.ref)}" onchange="setPrixVente(this)" onblur="setPrixVente(this)" onclick="event.stopPropagation()">`;
    const badgeHtml = isManual
      ? `<div class="manual-flag">✏️ saisie manuelle</div>`
      : matchBadge(p);
    const pvCell = `<div class="pv-row">${cdtInput}<span class="x">×</span>${pvInput}</div><div id="badge-${refSafe}">${badgeHtml}</div>`;

    let marginCell="<span class='muted'>—</span>";
    if(mpct!==null){
      const cls=mpct>=60?"margin-good":mpct>=30?"margin-ok":"margin-bad";
      marginCell=`<span class="${cls}">${mpct.toFixed(0)}%</span><br><small style="color:var(--muted)">${p._coeff.toFixed(2)}x · PA ${unit.toFixed(3)}€/u.</small>`;
    }
    const spark=sparkSVG(p.ref);
    const dispo=p.available_last>0?`<span style="color:var(--g3)">${p.available_last}</span>`:`<span class="muted">—</span>`;
    const status=p.is_active?`<span class="badge badge-active">✓</span>`:`<span class="badge badge-gone">Disparu</span>`;
    const favActive = isFavorite(p.ref) ? "active" : "";
    const favIcon = isFavorite(p.ref) ? "★" : "☆";
    return `<tr onclick="openModal('${esc(p.ref)}')">
      <td class="fav-cell" onclick="event.stopPropagation()">
        <span class="fav-star ${favActive}" onclick="toggleFavorite('${esc(p.ref)}', this)">${favIcon}</span>
      </td>
      <td class="mono" style="font-size:.68rem">${esc(p.ref)}</td>
      <td class="name"><span title="${esc(p.name)}">${esc(traducir(p.name))}</span>
        ${p.sub_name?`<div style="font-size:.67rem;color:var(--muted)">${esc(p.sub_name)}</div>`:""}
        ${attrsSummary(p)}
      </td>
      <td class="muted" style="font-size:.72rem">${esc(p.subcategory||"")}</td>
      <td>${condStr}</td>
      <td class="right">${p.price_last>0?`<span class="mono">${p.price_last.toFixed(2)}€</span>`:"—"}</td>
      <td class="right">${unitStr}</td>
      <td class="right">${dispo}</td>
      <td onclick="event.stopPropagation()">${pvCell}</td>
      <td class="right">${marginCell}</td>
      <td>${spark}</td>
      <td>${status}</td>
    </tr>`;
  }).join("");
  const total=filtered.length,pages=Math.ceil(total/PS)||1;
  document.getElementById("page-info").textContent=`Page ${page+1}/${pages}`;
  document.getElementById("result-count").textContent=`${total.toLocaleString()} produit(s)`;
  document.getElementById("prev-btn").disabled=page===0;
  document.getElementById("next-btn").disabled=page>=pages-1;
}

function recalcMarginRow(row, p){
  const ref = String(p.ref);
  const refSafe = ref.replace(/[^a-zA-Z0-9_-]/g,"_");
  const paUnit = p.price_last || 0;
  const pv = getPrixVente(p);
  const cdtV = getCdtVente(p);
  const pvUnitHt = pv ? (pv/cdtV)/TVA : null;
  const mpct = (pvUnitHt!=null && paUnit>0) ? (pvUnitHt-paUnit)/pvUnitHt*100 : null;
  const coeff = (pvUnitHt!=null && paUnit>0) ? pvUnitHt/paUnit : null;

  // Cellule marge (toujours recalculée, qu'elle vienne de Lilium ou d'une saisie manuelle)
  const mc = row.cells[8];
  if(mc){
    if(mpct!==null){
      const cls=mpct>=60?"margin-good":mpct>=30?"margin-ok":"margin-bad";
      mc.innerHTML=`<span class="${cls}">${mpct.toFixed(0)}%</span><br><small style="color:var(--muted)">${coeff.toFixed(2)}x · PA ${paUnit.toFixed(3)}€/u.</small>`;
    }else{
      mc.innerHTML="<span class='muted'>—</span>";
    }
  }

  // Badge sous les champs Vente, retrouvé par ID (fiable, pas de querySelector fragile)
  const isManual = sellPrices[ref]!==undefined || sellCdt[ref]!==undefined;
  const badgeDiv = document.getElementById("badge-"+refSafe);
  if(badgeDiv){
    badgeDiv.innerHTML = isManual ? `<div class="manual-flag">✏️ saisie manuelle</div>` : matchBadge(p);
  }
}

function setPrixVente(el){
  if(el.dataset.processing==="1") return;
  el.dataset.processing="1";
  setTimeout(()=>{el.dataset.processing="0";},150);

  const ref = String(el.dataset.ref);
  const val = parseFloat(el.value);

  if(isNaN(val)||val<0||el.value===""){
    delete sellPrices[ref];
  } else {
    sellPrices[ref]=val;
  }
  saveSellPrices();
  console.log("[vdn] PV sauvegardé pour", ref, "→", sellPrices[ref], "| localStorage:", localStorage.getItem("vdn_sell_prices"));

  const row=el.closest("tr");
  if(row){
    const p=DATA.products.find(x=>String(x.ref)===ref);
    if(p) recalcMarginRow(row,p);
  }
}

function setCdtVente(el){
  if(el.dataset.processing==="1") return;
  el.dataset.processing="1";
  setTimeout(()=>{el.dataset.processing="0";},150);

  const ref = String(el.dataset.ref);
  const val = parseInt(el.value);

  if(isNaN(val)||val<1||el.value===""){
    delete sellCdt[ref];
  } else {
    sellCdt[ref]=val;
  }
  saveSellCdt();
  console.log("[vdn] CDT sauvegardé pour", ref, "→", sellCdt[ref], "| localStorage:", localStorage.getItem("vdn_sell_cdt"));

  const row=el.closest("tr");
  if(row){
    const p=DATA.products.find(x=>String(x.ref)===ref);
    if(p) recalcMarginRow(row,p);
  }
}

// ── SPARKLINE ─────────────────────────────────────────────────
function sparkSVG(ref){
  const hist=DATA.history&&DATA.history[ref];
  if(!hist||hist.length<2)return '<svg class="spark"></svg>';
  const prices=hist.map(h=>h[1]);
  const mn=Math.min(...prices),mx=Math.max(...prices),range=mx-mn||1;
  const w=72,h=24,n=prices.length;
  const pts=prices.map((p,i)=>`${(i/(n-1))*w},${h-((p-mn)/range)*(h-4)-2}`).join(" ");
  const col=prices[prices.length-1]<=prices[0]?"#74c69d":"#e07070";
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(ref){
  const p=DATA.products.find(x=>String(x.ref)===ref);if(!p)return;
  selectedRef=ref;
  const info=catInfo(p.category);
  // p.price_last est déjà le prix unitaire Verdnatura
  const paUnit = p.price_last || 0;
  const pv = getPrixVente(p);
  const cdtVente = getCdtVente(p);
  const pvUnitHt = pv ? (pv/cdtVente)/TVA : null;
  const mpct = (pvUnitHt!=null && paUnit>0) ? (pvUnitHt-paUnit)/pvUnitHt*100 : null;
  const coeff = (pvUnitHt!=null && paUnit>0) ? pvUnitHt/paUnit : null;
  document.getElementById("modal-name").textContent=traducir(p.name);
  document.getElementById("modal-meta").textContent=
    `${info.emoji} ${info.label} › ${p.subcategory||""} · Réf. ${p.ref} · Depuis ${fmtDate(p.first_seen)} · ${p.snap_count||0} obs.`;
  document.getElementById("modal-stats").innerHTML=`
    <div class="ms"><div class="ms-val">${p.grouping>1?`Min. ×${p.grouping}`:"Sans minimum"}</div><div class="ms-lbl">Qté min. achat (Verdnatura)</div></div>
    <div class="ms"><div class="ms-val">${cdtVente>1?`Vente ×${cdtVente}`:"Vente unité"}</div><div class="ms-lbl">Cond. vente (boutique)</div></div>
    <div class="ms"><div class="ms-val">${paUnit>0?paUnit.toFixed(3)+"€":"—"}</div><div class="ms-lbl">PA HT / unité</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--orange)">${pv?(pv/cdtVente).toFixed(2)+"€":"—"}</div><div class="ms-lbl">PV TTC / unité</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--yellow)">${mpct!==null?mpct.toFixed(0)+"%":"—"}</div><div class="ms-lbl">Marge (TVA 10% déduite)</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--g2)">${coeff!==null?coeff.toFixed(2)+"x":"—"}</div><div class="ms-lbl">Coefficient</div></div>`;
  const tiersDiv=document.getElementById("modal-tiers");
  if(p.price_tiers&&Object.keys(p.price_tiers).length>0){
    const rows=Object.entries(p.price_tiers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]))
      .map(([qty,pr])=>`<tr><td>${qty} unités</td><td>${parseFloat(pr).toFixed(3)}€/u.</td><td>${(parseFloat(pr)*parseInt(qty)).toFixed(2)}€</td></tr>`).join("");
    tiersDiv.innerHTML=`<div style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">Prix par quantité :</div>
      <table class="tier-table"><thead><tr><th style="text-align:left">Qté</th><th>Prix/u.</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`;
  }else{
    tiersDiv.innerHTML=`<div style="font-size:.72rem;color:var(--muted)">Paliers de prix non encore collectés (run dominical)</div>`;
  }
  document.querySelectorAll(".pbtn").forEach(b=>b.classList.remove("active"));
  document.querySelector(".pbtn[data-days='30']").classList.add("active");
  drawChart(ref,30);
  document.getElementById("modal-bg").classList.add("open");
}

function drawChart(ref,days){
  const hist=(DATA.history&&DATA.history[ref])||[];
  const now=Date.now()/1000, cut=days===0?0:now-days*86400;
  const slice=hist.filter(h=>h[0]>=cut);
  const labels=slice.map(h=>new Date(h[0]*1000).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}));
  const prices=slice.map(h=>h[1]);
  if(activeChart)activeChart.destroy();
  const ctx=document.getElementById("price-chart").getContext("2d");
  activeChart=new Chart(ctx,{
    type:"line",
    data:{labels,datasets:[{label:"Prix/cond. (€)",data:prices,borderColor:"#74c69d",backgroundColor:"rgba(116,198,157,.08)",borderWidth:2,pointRadius:prices.length>60?0:3,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:"#152b1e",borderColor:"#1e3d2a",borderWidth:1,callbacks:{label:c=>`${c.parsed.y.toFixed(3)} €`}}},
      scales:{x:{ticks:{color:"#74c69d",maxTicksLimit:10,maxRotation:0},grid:{color:"#1e3d2a"}},
              y:{ticks:{color:"#74c69d",callback:v=>v.toFixed(2)+"€"},grid:{color:"#1e3d2a"}}}}
  });
}

// ── UTILS ─────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));}
function fmtDate(s){return s?new Date(s).toLocaleDateString("fr-FR"):"?";}
function render(){applyFilters();}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input",applyFilters);
document.getElementById("filter-sub").addEventListener("change",applyFilters);

document.getElementById("sort-by").addEventListener("change",e=>{sortKey=e.target.value;applyFilters();});
document.getElementById("prev-btn").addEventListener("click",()=>{if(page>0){page--;renderTable();}});
document.getElementById("next-btn").addEventListener("click",()=>{page++;renderTable();});
document.querySelectorAll("thead th[data-sort]").forEach(th=>th.addEventListener("click",()=>{
  const k=th.dataset.sort;if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=-1;}
  document.querySelectorAll("thead th").forEach(x=>x.classList.remove("sorted"));
  th.classList.add("sorted"); applyFilters();
}));
document.querySelectorAll(".pbtn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".pbtn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); drawChart(selectedRef,parseInt(b.dataset.days));
}));
document.getElementById("modal-close").addEventListener("click",()=>{
  document.getElementById("modal-bg").classList.remove("open");
  if(activeChart){activeChart.destroy();activeChart=null;}
});
document.getElementById("modal-bg").addEventListener("click",e=>{
  if(e.target===document.getElementById("modal-bg")){
    document.getElementById("modal-bg").classList.remove("open");
    if(activeChart){activeChart.destroy();activeChart=null;}
  }
});

load();
</script>
