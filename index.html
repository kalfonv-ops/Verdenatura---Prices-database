<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🌺 Verdnatura — Dashboard Prix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d1f17;--surf:#152b1e;--surf2:#1a3326;--border:#1e3d2a;
  --g1:#40916c;--g2:#74c69d;--g3:#b7e4c7;--text:#d8f3dc;--muted:#74c69d;
  --red:#e07070;--orange:#e0a070;--yellow:#e0d070;--radius:10px;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
header{background:var(--surf);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
header h1{font-size:1.1rem;color:var(--g2);white-space:nowrap}
.header-stats{display:flex;gap:.75rem;flex-wrap:wrap;margin-left:auto;font-size:.75rem;color:var(--muted)}
.hstat{background:rgba(64,145,108,.15);border:1px solid var(--border);border-radius:6px;padding:.2rem .6rem}
.hstat strong{color:var(--g2)}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 45px)}

/* ── SIDEBAR ── */
aside{width:200px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);overflow-y:auto;padding:.5rem 0}
.cat-btn{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;cursor:pointer;border:none;background:none;color:var(--muted);width:100%;text-align:left;font-size:.78rem;border-left:3px solid transparent;transition:all .15s}
.cat-btn:hover{background:rgba(64,145,108,.1);color:var(--text)}
.cat-btn.active{background:rgba(64,145,108,.18);color:var(--g2);border-left-color:var(--g1)}
.cat-btn .cat-count{margin-left:auto;font-size:.7rem;background:rgba(116,198,157,.12);border-radius:10px;padding:.1rem .35rem}
.cat-emoji{font-size:1rem;width:20px;text-align:center}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;padding:.75rem}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
input[type=search],select{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.35rem .6rem;font-size:.78rem;outline:none}
input[type=search]{flex:1;min-width:160px}
input[type=search]:focus,select:focus{border-color:var(--g1)}
select option{background:var(--bg)}
.btn{border:1px solid var(--border);background:var(--surf);color:var(--muted);border-radius:6px;padding:.35rem .7rem;cursor:pointer;font-size:.75rem}
.btn:hover{border-color:var(--g1);color:var(--text)}
.btn-green{border-color:var(--g1);color:var(--g2)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:.75rem}
thead th{background:var(--surf);padding:.5rem .6rem;text-align:left;color:var(--muted);white-space:nowrap;cursor:pointer;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);user-select:none}
thead th:hover{color:var(--g2)}
thead th.sorted{color:var(--g2)}
tbody tr{border-top:1px solid var(--border);transition:background .12s;cursor:pointer}
tbody tr:hover{background:rgba(64,145,108,.1)}
td{padding:.45rem .6rem;vertical-align:middle}
td.name{font-weight:500;max-width:220px}
td.name span{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
td.mono{font-family:monospace;color:var(--g2)}
td.muted{color:var(--muted)}
td.right{text-align:right}

/* ── BADGES ── */
.badge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600}
.badge-active{background:rgba(64,145,108,.2);color:var(--g2)}
.badge-gone{background:rgba(224,112,112,.15);color:var(--red)}
.pill{display:inline-block;padding:.1rem .4rem;border-radius:20px;font-size:.68rem}
.pill-up{background:rgba(224,112,112,.15);color:var(--red)}
.pill-down{background:rgba(64,145,108,.18);color:var(--g2)}
.pill-flat{background:rgba(116,198,157,.08);color:var(--muted)}

/* ── COND ── */
.cond{display:inline-block;background:rgba(116,198,157,.1);border:1px solid rgba(116,198,157,.2);border-radius:4px;padding:.1rem .35rem;font-size:.7rem;color:var(--g3)}

/* ── MARGIN ── */
.margin-good{color:#4caf50;font-weight:600}
.margin-ok{color:var(--yellow);font-weight:600}
.margin-bad{color:var(--red);font-weight:600}
input.prix-vente{background:rgba(116,198,157,.08);border:1px solid rgba(116,198,157,.15);color:var(--text);border-radius:4px;padding:.15rem .4rem;width:64px;font-size:.73rem;text-align:right}
input.prix-vente:focus{outline:none;border-color:var(--g1);background:rgba(64,145,108,.15)}

/* ── PAGER ── */
.pager{display:flex;align-items:center;gap:.4rem;margin-top:.6rem;font-size:.75rem;color:var(--muted)}
.pager button{background:var(--surf);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:.25rem .55rem;cursor:pointer}
.pager button:hover:not(:disabled){border-color:var(--g1);color:var(--text)}
.pager button:disabled{opacity:.35;cursor:default}

/* ── IMPORT PANEL ── */
.import-panel{background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;margin-bottom:.75rem;display:none}
.import-panel.open{display:block}
.import-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
textarea.csv-input{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.5rem;font-family:monospace;font-size:.72rem;width:100%;height:100px;resize:vertical}

/* ── MODAL ── */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
#modal-bg.open{display:flex}
#modal{background:var(--surf);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;padding:1.25rem}
#modal h2{font-size:1rem;color:var(--g2);margin-bottom:.25rem}
#modal .meta{font-size:.75rem;color:var(--muted);margin-bottom:1rem}
#modal-close{float:right;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:.25rem .6rem;cursor:pointer;font-size:.75rem}
#modal-close:hover{border-color:var(--g1);color:var(--text)}
.chart-wrap{position:relative;height:220px;margin-bottom:1rem}
.modal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1rem}
.ms{background:var(--bg);border-radius:8px;padding:.5rem .65rem}
.ms-val{font-size:1.1rem;font-weight:700;color:var(--g2)}
.ms-lbl{font-size:.68rem;color:var(--muted)}
.period-btns{display:flex;gap:.35rem;margin-bottom:.75rem}
.pbtn{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.25rem .65rem;cursor:pointer;font-size:.72rem}
.pbtn.active{background:var(--g1);color:#fff;border-color:var(--g1)}
.tier-table{width:100%;border-collapse:collapse;font-size:.75rem;margin-top:.5rem}
.tier-table th{color:var(--muted);padding:.3rem .5rem;border-bottom:1px solid var(--border);text-align:right}
.tier-table td{padding:.3rem .5rem;border-bottom:1px solid rgba(30,61,42,.5);text-align:right}
.tier-table td:first-child{text-align:left;color:var(--g3)}

/* ── SPARKLINE ── */
.spark{width:72px;height:24px}

#loading{text-align:center;padding:4rem;color:var(--muted)}
</style>
</head>
<body>

<header>
  <span style="font-size:1.5rem">🌺</span>
  <h1>Verdnatura — Dashboard Prix</h1>
  <div class="header-stats" id="hstats"></div>
</header>

<div class="layout">
  <!-- SIDEBAR CATÉGORIES -->
  <aside id="sidebar">
    <div style="padding:.4rem .75rem .2rem;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Catégories</div>
    <button class="cat-btn active" data-cat="all" onclick="selectCat('all',this)">
      <span class="cat-emoji">🌐</span> Tous
      <span class="cat-count" id="cnt-all">—</span>
    </button>
  </aside>

  <main>
    <!-- IMPORT PRIX DE VENTE -->
    <div class="import-panel" id="import-panel">
      <div style="font-size:.8rem;color:var(--g2);font-weight:600">📥 Importer liste de prix de vente</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:.3rem">
        Format CSV : <code style="color:var(--g3)">ref,prix_vente</code> (prix HT par tige/unité) ou <code style="color:var(--g3)">sous_genre,prix_vente</code>
      </div>
      <textarea class="csv-input" id="csv-input" placeholder="ref,prix_vente
191979,0.50
191980,0.80

ou par sous-genre :
sous_genre,prix_vente
Alstroemeria,0.45
Anthurium,0.80
Roses Hollande,1.20"></textarea>
      <div class="import-row">
        <button class="btn btn-green" onclick="importPrices()">✅ Importer</button>
        <button class="btn" onclick="clearPrices()">🗑️ Effacer tout</button>
        <button class="btn" onclick="exportPrices()">📤 Exporter</button>
        <span id="import-status" style="font-size:.72rem;color:var(--muted)"></span>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input type="search" id="search" placeholder="🔍 Rechercher…">
      <select id="filter-sub"><option value="">Tous sous-genres</option></select>
      <select id="filter-status">
        <option value="all">Tous statuts</option>
        <option value="active">Actifs</option>
        <option value="inactive">Disparus</option>
      </select>
      <select id="sort-by">
        <option value="name">Trier : Nom</option>
        <option value="price_last">Prix achat</option>
        <option value="price_unit">Prix/unité</option>
        <option value="margin_pct">Marge %</option>
        <option value="snap_count">Observations</option>
        <option value="available_last">Dispo</option>
      </select>
      <button class="btn btn-green" onclick="toggleImport()">💰 Prix de vente</button>
      <span id="last-update" style="font-size:.7rem;color:var(--muted);margin-left:auto"></span>
    </div>

    <!-- TABLE -->
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Ref</th>
            <th>Produit</th>
            <th>Sous-genre</th>
            <th data-sort="grouping">Cond.</th>
            <th data-sort="price_last">Prix/cond.</th>
            <th data-sort="price_unit">Prix/unité</th>
            <th data-sort="available_last">Dispo</th>
            <th data-sort="prix_vente">Prix vente <small style="opacity:.6">(HT/u.)</small></th>
            <th data-sort="margin_pct">Marge</th>
            <th>Évol.</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button id="prev-btn">◀</button>
      <span id="page-info"></span>
      <button id="next-btn">▶</button>
      <span id="result-count" style="margin-left:.5rem"></span>
    </div>
  </main>
</div>

<!-- MODAL DÉTAIL -->
<div id="modal-bg">
  <div id="modal">
    <button id="modal-close">✕ Fermer</button>
    <h2 id="modal-name"></h2>
    <div class="meta" id="modal-meta"></div>
    <div class="modal-stats" id="modal-stats"></div>
    <div class="period-btns">
      <button class="pbtn" data-days="7">7j</button>
      <button class="pbtn active" data-days="30">30j</button>
      <button class="pbtn" data-days="90">90j</button>
      <button class="pbtn" data-days="0">Tout</button>
    </div>
    <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
    <div id="modal-tiers"></div>
  </div>
</div>

<div id="loading">⏳ Chargement…</div>
<div id="app" style="display:none"></div>

<script>
// ── REALM MAP ──────────────────────────────────────────────────
const REALM_MAP = {
  // Anciens clés (compatibilité)
  realm_1:  {label:"Fleurs coupées",       emoji:"🌸"},
  realm_2:  {label:"Plantes",              emoji:"🪴"},
  realm_3:  {label:"Compléments floraux",  emoji:"🎀"},
  realm_4:  {label:"Artificiel",           emoji:"🌿"},
  realm_5:  {label:"Feuillages frais",     emoji:"🍃"},
  realm_7:  {label:"Confection naturelle", emoji:"💐"},
  realm_10: {label:"Confection artificielle", emoji:"🎋"},
  realm_13: {label:"Sec & Préservé",       emoji:"🌾"},
  // Nouveaux noms (v7.5 — clé = nom complet avec emoji)
  "🌸 Fleurs coupées":         {label:"Fleurs coupées",          emoji:"🌸"},
  "🪴 Plantes":                {label:"Plantes",                 emoji:"🪴"},
  "🎀 Compléments floraux":    {label:"Compléments floraux",     emoji:"🎀"},
  "🌿 Artificiel":             {label:"Artificiel",              emoji:"🌿"},
  "🍃 Feuillages frais":       {label:"Feuillages frais",        emoji:"🍃"},
  "💐 Confection naturelle":   {label:"Confection naturelle",    emoji:"💐"},
  "🎋 Confection artificielle":{label:"Confection artificielle", emoji:"🎋"},
  "🌾 Sec & Préservé":         {label:"Sec & Préservé",          emoji:"🌾"},
};

// Extraire emoji et label depuis la clé catégorie
function catInfo(cat) {
  if (REALM_MAP[cat]) return REALM_MAP[cat];
  // Fallback : extraire l'emoji du début du nom
  const m = cat.match(/^(\p{Emoji})\s*(.+)$/u);
  if (m) return {emoji: m[1], label: m[2]};
  return {emoji:"📦", label: cat};
}

// ── STATE ──────────────────────────────────────────────────────
let DATA = null, filtered = [], sortKey = "name", sortDir = 1;
let page = 0; const PS = 60;
let activeCat = "all";
let sellPrices = {};   // {ref: prix_vente} ou {sous_genre: prix_vente}
let activeChart = null, selectedRef = null;

// ── LOAD ───────────────────────────────────────────────────────
async function load(){
  try{
    const r = await fetch("data.json?" + Date.now());
    DATA = await r.json();
    loadSellPrices();
    buildSidebar();
    buildSubFilter();
    render();
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display = "block";
  }catch(e){
    document.getElementById("loading").innerHTML =
      "❌ Impossible de charger data.json<br><small>Vérifie que le fichier data.json est bien dans le repo GitHub</small>";
  }
}

// ── SIDEBAR CATÉGORIES ─────────────────────────────────────────
function buildSidebar(){
  const aside = document.getElementById("sidebar");
  // Compter par category
  const counts = {};
  DATA.products.forEach(p => { counts[p.category] = (counts[p.category]||0)+1; });
  document.getElementById("cnt-all").textContent = DATA.products.length;

  // Trier les realms dans l'ordre connu
  const order = [
    "🌸 Fleurs coupées","🪴 Plantes","🎀 Compléments floraux","🌿 Artificiel",
    "🍃 Feuillages frais","💐 Confection naturelle","🎋 Confection artificielle","🌾 Sec & Préservé",
    "realm_1","realm_2","realm_3","realm_4","realm_5","realm_7","realm_10","realm_13"
  ];
  const catKeys = [...new Set(DATA.products.map(p => p.category))].sort((a,b)=>{
    return (order.indexOf(a)+1||99) - (order.indexOf(b)+1||99);
  });

  catKeys.forEach(cat => {
    const info = catInfo(cat);
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.dataset.cat = cat;
    btn.innerHTML = `<span class="cat-emoji">${info.emoji}</span> ${info.label}
      <span class="cat-count">${counts[cat]||0}</span>`;
    btn.onclick = () => selectCat(cat, btn);
    aside.appendChild(btn);
  });

  // Header stats
  const s = DATA.stats;
  const d = new Date(DATA.generated);
  document.getElementById("hstats").innerHTML = `
    <div class="hstat"><strong>${s.active.toLocaleString()}</strong> actifs</div>
    <div class="hstat"><strong>${s.new_7d}</strong> nouveaux 7j</div>
    <div class="hstat"><strong>${s.lost_7d}</strong> disparus 7j</div>
    <div class="hstat"><strong>${s.total_snapshots.toLocaleString()}</strong> observations</div>
  `;
  document.getElementById("last-update").textContent =
    "Mis à jour : " + d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

function selectCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  buildSubFilter();
  applyFilters();
}

// ── SOUS-GENRE FILTER ──────────────────────────────────────────
function buildSubFilter(){
  const products = activeCat==="all" ? DATA.products : DATA.products.filter(p=>p.category===activeCat);
  const subs = [...new Set(products.map(p=>p.subcategory||"").filter(Boolean))].sort();
  const sel = document.getElementById("filter-sub");
  sel.innerHTML = '<option value="">Tous sous-genres</option>';
  subs.forEach(s => {
    const o = document.createElement("option");
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ── PRIX DE VENTE (localStorage) ──────────────────────────────
function loadSellPrices(){
  try{ sellPrices = JSON.parse(localStorage.getItem("vdn_sell_prices") || "{}"); }
  catch{ sellPrices = {}; }
}
function saveSellPrices(){
  localStorage.setItem("vdn_sell_prices", JSON.stringify(sellPrices));
}

function getPrixVente(p){
  // Chercher d'abord par ref, puis par sous_genre
  if(sellPrices[p.ref]) return parseFloat(sellPrices[p.ref]);
  if(p.subcategory && sellPrices[p.subcategory]) return parseFloat(sellPrices[p.subcategory]);
  return null;
}

function importPrices(){
  const csv = document.getElementById("csv-input").value.trim();
  if(!csv){ alert("Colle d'abord ton CSV"); return; }
  const lines = csv.split("\n").filter(l=>l.trim() && !l.startsWith("ref,") && !l.startsWith("sous_genre,"));
  let count = 0;
  lines.forEach(line => {
    const [key, val] = line.split(",").map(s=>s.trim());
    if(key && val && !isNaN(parseFloat(val))){
      sellPrices[key] = parseFloat(val);
      count++;
    }
  });
  saveSellPrices();
  document.getElementById("import-status").textContent = `✅ ${count} prix importés`;
  applyFilters();
}

function clearPrices(){
  if(!confirm("Effacer tous les prix de vente ?")) return;
  sellPrices = {};
  saveSellPrices();
  document.getElementById("import-status").textContent = "🗑️ Effacé";
  applyFilters();
}

function exportPrices(){
  const lines = ["ref,prix_vente", ...Object.entries(sellPrices).map(([k,v])=>`${k},${v}`)];
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "prix_vente_verdnatura.csv"; a.click();
}

function toggleImport(){
  document.getElementById("import-panel").classList.toggle("open");
}

// ── FILTER + SORT ──────────────────────────────────────────────
function applyFilters(){
  const q   = document.getElementById("search").value.toLowerCase();
  const sub = document.getElementById("filter-sub").value;
  const st  = document.getElementById("filter-status").value;

  filtered = DATA.products.filter(p => {
    if(activeCat !== "all" && p.category !== activeCat) return false;
    if(sub && (p.subcategory||"") !== sub) return false;
    if(st==="active" && !p.is_active) return false;
    if(st==="inactive" && p.is_active) return false;
    if(q && !p.name.toLowerCase().includes(q) && !(p.subcategory||"").toLowerCase().includes(q) && !p.ref.includes(q)) return false;
    return true;
  });

  // Calculer prix/unité et marge pour tri
  filtered.forEach(p => {
    p._unit  = p.grouping > 0 && p.price_last > 0 ? p.price_last/p.grouping : 0;
    const pv = getPrixVente(p);
    p._pv    = pv;
    p._mpct  = pv && p._unit > 0 ? (pv - p._unit)/pv*100 : null;
  });

  filtered.sort((a,b)=>{
    let va = sortKey==="price_unit" ? a._unit : sortKey==="prix_vente" ? (a._pv||0) : sortKey==="margin_pct" ? (a._mpct||0) : (a[sortKey]??0);
    let vb = sortKey==="price_unit" ? b._unit : sortKey==="prix_vente" ? (b._pv||0) : sortKey==="margin_pct" ? (b._mpct||0) : (b[sortKey]??0);
    if(typeof va==="string") return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });

  page = 0;
  renderTable();
}

// ── TABLE ─────────────────────────────────────────────────────
function renderTable(){
  const slice  = filtered.slice(page*PS, (page+1)*PS);
  const tbody  = document.getElementById("tbody");
  const catMap = REALM_MAP;

  tbody.innerHTML = slice.map(p => {
    const unit  = p._unit;
    const pv    = p._pv;
    const mpct  = p._mpct;

    const unitStr = unit > 0 ? `<span class="mono">${unit.toFixed(3)}€</span>` : "<span class='muted'>—</span>";
    const condStr = p.grouping > 1 ? `<span class="cond">×${p.grouping}</span>` : `<span class="cond">unité</span>`;
    const pvCell  = pv != null
      ? `<input class="prix-vente" type="number" step="0.01" min="0" value="${pv.toFixed(2)}" data-ref="${esc(p.ref)}" data-sub="${esc(p.subcategory||'')}" onchange="setPrixVente(this)" onclick="event.stopPropagation()">`
      : `<input class="prix-vente" type="number" step="0.01" min="0" placeholder="—" data-ref="${esc(p.ref)}" data-sub="${esc(p.subcategory||'')}" onchange="setPrixVente(this)" onclick="event.stopPropagation()">`;

    let marginCell = "<span class='muted'>—</span>";
    if(mpct !== null){
      const cls = mpct >= 60 ? "margin-good" : mpct >= 30 ? "margin-ok" : "margin-bad";
      marginCell = `<span class="${cls}">${mpct.toFixed(0)}%</span><br><small style="color:var(--muted)">${(pv-unit).toFixed(3)}€/u.</small>`;
    }

    const spark = sparkSVG(p.ref);
    const dispo = p.available_last > 0 ? `<span style="color:var(--g3)">${p.available_last}</span>` : `<span class="muted">—</span>`;
    const status = p.is_active ? `<span class="badge badge-active">✓</span>` : `<span class="badge badge-gone">Disparu</span>`;

    return `<tr onclick="openModal('${esc(p.ref)}')">
      <td class="mono" style="font-size:.68rem">${esc(p.ref)}</td>
      <td class="name"><span title="${esc(p.name)}">${esc(p.name)}</span>
        ${p.sub_name ? `<div style="font-size:.67rem;color:var(--muted)">${esc(p.sub_name)}</div>` : ""}
      </td>
      <td class="muted" style="font-size:.72rem">${esc(p.subcategory||"")}</td>
      <td>${condStr}</td>
      <td class="right">${p.price_last > 0 ? `<span class="mono">${p.price_last.toFixed(2)}€</span>` : "—"}</td>
      <td class="right">${unitStr}</td>
      <td class="right">${dispo}</td>
      <td onclick="event.stopPropagation()">${pvCell}</td>
      <td class="right">${marginCell}</td>
      <td>${spark}</td>
      <td>${status}</td>
    </tr>`;
  }).join("");

  const total = filtered.length, pages = Math.ceil(total/PS)||1;
  document.getElementById("page-info").textContent = `Page ${page+1}/${pages}`;
  document.getElementById("result-count").textContent = `${total.toLocaleString()} produit(s)`;
  document.getElementById("prev-btn").disabled = page===0;
  document.getElementById("next-btn").disabled = page>=pages-1;
}

function setPrixVente(el){
  const val = parseFloat(el.value);
  if(isNaN(val)||val<0){ delete sellPrices[el.dataset.ref]; }
  else { sellPrices[el.dataset.ref] = val; }
  saveSellPrices();
  // Recalcul marge inline
  const row = el.closest("tr");
  if(row){
    // Recalculer en place
    const ref = el.dataset.ref;
    const p   = DATA.products.find(x=>x.ref===ref);
    if(p){
      const unit = p.grouping>0&&p.price_last>0 ? p.price_last/p.grouping : 0;
      const pv   = val;
      const mpct = pv>0&&unit>0 ? (pv-unit)/pv*100 : null;
      const mc   = row.cells[8];
      if(mc){
        if(mpct!==null){
          const cls = mpct>=60?"margin-good":mpct>=30?"margin-ok":"margin-bad";
          mc.innerHTML = `<span class="${cls}">${mpct.toFixed(0)}%</span><br><small style="color:var(--muted)">${(pv-unit).toFixed(3)}€/u.</small>`;
        } else mc.innerHTML = "<span class='muted'>—</span>";
      }
    }
  }
}

// ── SPARKLINE ─────────────────────────────────────────────────
function sparkSVG(ref){
  const hist = DATA.history[ref];
  if(!hist||hist.length<2) return '<svg class="spark"></svg>';
  const prices = hist.map(h=>h[1]);
  const mn=Math.min(...prices), mx=Math.max(...prices), range=mx-mn||1;
  const w=72,h=24,n=prices.length;
  const pts = prices.map((p,i)=>`${(i/(n-1))*w},${h-((p-mn)/range)*(h-4)-2}`).join(" ");
  const col = prices[prices.length-1]<=prices[0]?"#74c69d":"#e07070";
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`;
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(ref){
  const p = DATA.products.find(x=>x.ref===ref); if(!p) return;
  selectedRef = ref;
  const info = catInfo(p.category);
  const unit  = p.grouping>0&&p.price_last>0 ? p.price_last/p.grouping : 0;
  const pv    = getPrixVente(p);
  const mpct  = pv&&unit>0 ? (pv-unit)/pv*100 : null;

  document.getElementById("modal-name").textContent = p.name;
  document.getElementById("modal-meta").textContent =
    `${info.emoji} ${info.label} › ${p.subcategory||""} · Réf. ${p.ref} · `+
    `Depuis ${fmtDate(p.first_seen)} · Dernier vu ${fmtDate(p.last_seen)} · ${p.snap_count} obs.`;

  document.getElementById("modal-stats").innerHTML = `
    <div class="ms"><div class="ms-val">${p.grouping>1?`×${p.grouping}`:"Unité"}</div><div class="ms-lbl">Conditionnement</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--g2)">${unit>0?unit.toFixed(3)+"€":"—"}</div><div class="ms-lbl">Prix/unité</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--red)">${fmt(p.price_max)}</div><div class="ms-lbl">Max historique</div></div>
    <div class="ms"><div class="ms-val" style="color:var(--yellow)">${mpct!==null?mpct.toFixed(0)+"%":"—"}</div><div class="ms-lbl">Marge estimée</div></div>
  `;

  // Tiers de prix (si présents)
  const tiersDiv = document.getElementById("modal-tiers");
  if(p.price_tiers && Object.keys(p.price_tiers).length > 0){
    const rows = Object.entries(p.price_tiers).sort((a,b)=>parseInt(a[0])-parseInt(b[0]))
      .map(([qty,pr])=>`<tr><td>${qty} unités</td><td>${parseFloat(pr).toFixed(3)}€/u.</td><td>${(parseFloat(pr)*parseInt(qty)).toFixed(2)}€ total</td></tr>`).join("");
    tiersDiv.innerHTML = `<div style="font-size:.78rem;color:var(--muted);margin-bottom:.3rem">Prix par quantité :</div>
      <table class="tier-table"><thead><tr><th style="text-align:left">Quantité</th><th>Prix/unité</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`;
  } else {
    tiersDiv.innerHTML = `<div style="font-size:.72rem;color:var(--muted)">Prix par palier non encore collectés (cliquer sur le produit dans le shop pour les voir)</div>`;
  }

  document.querySelectorAll(".pbtn").forEach(b=>b.classList.remove("active"));
  document.querySelector(".pbtn[data-days='30']").classList.add("active");
  drawChart(ref, 30);
  document.getElementById("modal-bg").classList.add("open");
}

function drawChart(ref, days){
  const hist = DATA.history[ref]||[];
  const now  = Date.now()/1000;
  const cut  = days===0 ? 0 : now-days*86400;
  const slice= hist.filter(h=>h[0]>=cut);
  const labels = slice.map(h=>new Date(h[0]*1000).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"}));
  const prices = slice.map(h=>h[1]);
  if(activeChart) activeChart.destroy();
  const ctx = document.getElementById("price-chart").getContext("2d");
  activeChart = new Chart(ctx,{
    type:"line",
    data:{labels,datasets:[{label:"Prix/cond. (€)",data:prices,borderColor:"#74c69d",backgroundColor:"rgba(116,198,157,.08)",borderWidth:2,pointRadius:prices.length>60?0:3,pointHoverRadius:5,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:"#152b1e",borderColor:"#1e3d2a",borderWidth:1,callbacks:{label:c=>`${c.parsed.y.toFixed(3)} €`}}},
      scales:{x:{ticks:{color:"#74c69d",maxTicksLimit:10,maxRotation:0},grid:{color:"#1e3d2a"}},
              y:{ticks:{color:"#74c69d",callback:v=>v.toFixed(2)+"€"},grid:{color:"#1e3d2a"}}}}
  });
}

// ── UTILS ─────────────────────────────────────────────────────
function fmt(v){ return v!=null ? v.toFixed(2)+"€" : "—"; }
function esc(s){ return String(s||"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function fmtDate(s){ return s ? new Date(s).toLocaleDateString("fr-FR") : "?"; }

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("filter-sub").addEventListener("change", applyFilters);
document.getElementById("filter-status").addEventListener("change", applyFilters);
document.getElementById("sort-by").addEventListener("change", e=>{ sortKey=e.target.value; applyFilters(); });
document.getElementById("prev-btn").addEventListener("click", ()=>{ if(page>0){page--;renderTable();} });
document.getElementById("next-btn").addEventListener("click", ()=>{ page++; renderTable(); });

document.querySelectorAll("thead th[data-sort]").forEach(th=>th.addEventListener("click",()=>{
  const k=th.dataset.sort; if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=-1;}
  document.querySelectorAll("thead th").forEach(x=>x.classList.remove("sorted"));
  th.classList.add("sorted");
  applyFilters();
}));

document.querySelectorAll(".pbtn").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".pbtn").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  drawChart(selectedRef, parseInt(b.dataset.days));
}));

document.getElementById("modal-close").addEventListener("click",()=>{
  document.getElementById("modal-bg").classList.remove("open");
  if(activeChart){activeChart.destroy();activeChart=null;}
});
document.getElementById("modal-bg").addEventListener("click",e=>{
  if(e.target===document.getElementById("modal-bg")){
    document.getElementById("modal-bg").classList.remove("open");
    if(activeChart){activeChart.destroy();activeChart=null;}
  }
});

function render(){ applyFilters(); }

load();
</script>
</body>
</html>
